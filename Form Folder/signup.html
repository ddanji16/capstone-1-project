<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>


    <div class="container">

        <h2>Create Account</h2>

        <form action="">

            <label for="firstname">First Name</label><br>
            <input type="text" name="firstname" id="firstname" placeholder="Enter First Name"> <br>

            <label for="lastname">Last Name</label> <br>
            <input type="text" name="lastname" id="lastname" placeholder="Enter Last Name"> <br>

            <label for="email">Email</label> <br>
            <input type="email" name="email" id="email" placeholder="Enter Email"> <br>


            <label for="password">Password</label><br>
            <input type="password" name="password" id="password" placeholder="Enter Password"> <br>

            <label for="confirmpassword">Confirm Password</label><br>
            <input type="confirmpassword" name="confirmpassword" id="confirmpassword" placeholder="Confirm Password"> <br>

            <button id="login" name="login" value="login">Create Account</button>

        </form>

        
      <p>Don't have an Account? <a href="login.html"> Sign Up</p></a>
    </div>
    
</body>
</html>
    
</body>
</html>
